<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Malgun Gothic', -apple-system, sans-serif;
      padding: 20px;
      background: #f8f9fa;
    }
    .container {
      max-width: 500px;
      background: white;
      padding: 24px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h3 {
      color: #333;
      margin-bottom: 20px;
      font-size: 18px;
    }
    .tag-info {
      background: #e8f4fd;
      border-left: 3px solid #0066cc;
      padding: 12px;
      margin-bottom: 20px;
      border-radius: 4px;
    }
    .tag-info p {
      font-size: 13px;
      color: #555;
      margin-bottom: 8px;
    }
    .tag-list {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .tag {
      background: white;
      border: 1px solid #0066cc;
      color: #0066cc;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tag:hover {
      background: #0066cc;
      color: white;
    }
    .form-group {
      margin-bottom: 18px;
    }
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
      color: #333;
      font-size: 14px;
    }
    input[type="text"], textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus, textarea:focus {
      outline: none;
      border-color: #0066cc;
    }
    textarea {
      min-height: 150px;
      resize: vertical;
    }
    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .checkbox-group input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }
    .checkbox-group label {
      margin: 0;
      font-weight: normal;
      cursor: pointer;
    }
    .file-info {
      background: #f5f5f5;
      padding: 10px;
      border-radius: 4px;
      font-size: 13px;
      color: #666;
      margin-top: 8px;
    }
    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary {
      background: #0066cc;
      color: white;
    }
    .btn-primary:hover {
      background: #0052a3;
    }
    .btn-secondary {
      background: #6c757d;
      color: white;
      margin-top: 10px;
    }
    .btn-secondary:hover {
      background: #5a6268;
    }
  </style>
</head>
<body>
  <div class="container">
    <h3>📧 메일 발송 설정</h3>
    
    <div class="tag-info">
      <p><strong>치환 태그</strong> (클릭하여 삽입):</p>
      <div class="tag-list">
        <span class="tag" onclick="insertTag('{성함}')">{성함}</span>
        <span class="tag" onclick="insertTag('{이메일}')">{이메일}</span>
        <span class="tag" onclick="insertTag('{핸드폰번호}')">{핸드폰번호}</span>
      </div>
      <p style="margin-top: 8px; font-size: 12px; color: #777;">* 태그는 발송 시 실제 데이터로 자동 치환됩니다.</p>
    </div>
    
    <div class="form-group">
      <label for="subject">메일 제목:</label>
      <input type="text" id="subject" placeholder="예: [안내] 12월 행사 안내">
    </div>
    
    <div class="form-group">
      <label for="body">메일 본문:</label>
      <textarea id="body" placeholder="안녕하세요 {성함}님,

방화2종합사회복지관에서 새로운 소식을 전해드립니다.

감사합니다."></textarea>
    </div>
    
    <div class="form-group">
      <div class="checkbox-group">
        <input type="checkbox" id="useAttachment">
        <label for="useAttachment">첨부 파일 추가하기</label>
      </div>
      <div class="file-info">
        📎 Google Drive 파일 ID를 입력하세요.<br>
        (파일 우클릭 > 공유 > 링크 복사 후 ID 부분만 붙여넣기)
      </div>
      <input type="text" id="fileId" placeholder="파일 ID (선택사항)" style="margin-top: 8px;">
    </div>
    
    <button class="btn btn-primary" onclick="sendEmail()">메일 발송 시작</button>
    <button class="btn btn-secondary" onclick="google.script.host.close()">취소</button>
  </div>
  
  <script>
    let lastFocusedInput = null;
    
    document.querySelectorAll('input, textarea').forEach(el => {
      el.addEventListener('focus', function() {
        lastFocusedInput = this;
      });
    });
    
    function insertTag(tag) {
      const target = lastFocusedInput || document.getElementById('body');
      const start = target.selectionStart;
      const end = target.selectionEnd;
      const text = target.value;
      
      target.value = text.substring(0, start) + tag + text.substring(end);
      target.focus();
      target.selectionStart = target.selectionEnd = start + tag.length;
    }
    
    function sendEmail() {
      const subject = document.getElementById('subject').value;
      const body = document.getElementById('body').value;
      const useAttachment = document.getElementById('useAttachment').checked;
      const fileId = document.getElementById('fileId').value;
      
      if (!subject || !body) {
        alert('제목과 본문을 모두 입력해주세요.');
        return;
      }
      
      google.script.run
        .withSuccessHandler(function(result) {
          alert(result);
          google.script.host.close();
        })
        .withFailureHandler(function(error) {
          alert('오류: ' + error.message);
        })
        .sendCustomEmail(subject, body, useAttachment ? fileId : '');
    }
  </script>
</body>
</html>
